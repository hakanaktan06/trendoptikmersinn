<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trend Optik | Yönetim Paneli</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #0f0f0f; color: #fff; font-family: 'Poppins', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 2rem; }
    .accent { color: #f5a623; }
    .btn-accent { background: #f5a623; color: #000; font-weight: bold; border: none; }
    .form-control, .form-select { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
    .table { color: #fff; } .table th { border-bottom: 2px solid #f5a623; } .table td { border-bottom: 1px solid rgba(255, 255, 255, 0.1); vertical-align: middle; }
    #dashboardSection { display: none; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="text-center mb-5"><h2 class="fw-bold"><span class="accent">Trend Optik</span> Yönetim</h2></div>

  <div class="row justify-content-center" id="loginSection">
    <div class="col-md-5">
      <div class="glass-panel text-center">
        <i class="bi bi-shield-lock fs-1 accent mb-3"></i><h4 class="mb-4">Yetkili Girişi</h4>
        <input type="email" id="emailInput" class="form-control mb-3" placeholder="E-posta">
        <input type="password" id="passwordInput" class="form-control mb-4" placeholder="Şifre">
        <button id="loginBtn" class="btn btn-accent w-100 rounded-pill py-2">Giriş Yap</button>
      </div>
    </div>
  </div>

  <div id="dashboardSection">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="m-0">Hoş Geldin, <span class="accent">Patron</span></h4>
      <button id="logoutBtn" class="btn btn-outline-danger rounded-pill px-4">Çıkış Yap</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-4"><div class="glass-panel text-center p-3" style="border-bottom: 3px solid #f5a623;"><h6 class="opacity-75 mb-1">Sistemdeki Ürün</h6><h2 class="fw-bold mb-0" id="totalProductCount">0</h2></div></div>
      <div class="col-md-4"><div class="glass-panel text-center p-3" style="border-bottom: 3px solid #25D366;"><h6 class="opacity-75 mb-1">Sunucu Durumu</h6><h2 class="fw-bold mb-0 text-success">Aktif</h2></div></div>
      <div class="col-md-4"><div class="glass-panel text-center p-3" style="border-bottom: 3px solid #0dcaf0;"><h6 class="opacity-75 mb-1">Veritabanı Hızı</h6><h2 class="fw-bold mb-0 text-info">Kusursuz</h2></div></div>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="glass-panel">
          <h5 class="accent mb-3" id="formTitle"><i class="bi bi-plus-circle me-2"></i>Yeni Ürün Ekle</h5>
          <input type="text" id="pName" class="form-control mb-3" placeholder="Ürün Adı">
          <select id="pCategory" class="form-select mb-3"><option value="gunes">Güneş</option><option value="klasik">Klasik</option><option value="kadin">Kadın</option><option value="cocuk">Çocuk</option></select>
          <input type="number" id="pPrice" class="form-control mb-3" placeholder="Fiyat (Sadece Rakam)">
          <input type="text" id="pDesc" class="form-control mb-3" placeholder="Kısa Açıklama">
          <input type="text" id="pImgUrl" class="form-control mb-3" placeholder="Resim URL (ImgBB)">
          <button id="addBtn" class="btn btn-accent w-100 rounded-pill py-2">Ürünü Kaydet</button>
          <button id="cancelEditBtn" class="btn btn-outline-light w-100 rounded-pill py-2 mt-2" style="display:none;">İptal Et</button>
        </div>
      </div>

      <div class="col-md-8">
        <div class="glass-panel h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="accent m-0"><i class="bi bi-list-ul me-2"></i>Mevcut Ürünler</h5>
            <button id="vipBtn" class="btn btn-warning rounded-pill px-3 fw-bold text-dark"><i class="bi bi-stars"></i> VIP Teklif Oluştur</button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover table-dark text-center align-middle">
              <thead>
                <tr>
                  <th>Seç</th>
                  <th>Görsel</th>
                  <th>Ürün Adı</th>
                  <th>Fiyat</th>
                  <th>🔥 İlgi</th>
                  <th>İşlemler</th>
                </tr>
              </thead>
              <tbody id="productTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const app = initializeApp({ apiKey: "AIzaSyDKROzPt8ZaQXk_m5sMEY853BCafnZFb4o", authDomain: "trendoptik.firebaseapp.com", projectId: "trendoptik", storageBucket: "trendoptik.firebasestorage.app", messagingSenderId: "645619125341", appId: "1:645619125341:web:a43aad6e213c80fbe351b4" });
  const auth = getAuth(app); const db = getFirestore(app);
  let editModeId = null; let adminProducts = [];

  document.getElementById("loginBtn").addEventListener("click", () => signInWithEmailAndPassword(auth, document.getElementById("emailInput").value, document.getElementById("passwordInput").value));
  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
  onAuthStateChanged(auth, (user) => {
    if (user) { document.getElementById("loginSection").style.display="none"; document.getElementById("dashboardSection").style.display="block"; loadProducts(); } 
    else { document.getElementById("loginSection").style.display="flex"; document.getElementById("dashboardSection").style.display="none"; }
  });

  document.getElementById("addBtn").addEventListener("click", async () => {
    const data = { name: document.getElementById("pName").value, category: document.getElementById("pCategory").value, price: document.getElementById("pPrice").value, desc: document.getElementById("pDesc").value, img: document.getElementById("pImgUrl").value };
    if(!data.name || !data.price || !data.img) return alert("Doldur!");
    if(editModeId) { await updateDoc(doc(db, "products", editModeId), data); editModeId = null; } 
    else { data.createdAt = serverTimestamp(); data.clicks = 0; await addDoc(collection(db, "products"), data); }
    loadProducts();
  });

  async function loadProducts() {
    const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
    const qs = await getDocs(q);
    document.getElementById("productTableBody").innerHTML = ""; adminProducts = [];
    qs.forEach((doc) => {
      const p = doc.data(); adminProducts.push({ id: doc.id, ...p });
      const clicks = p.clicks || 0;
      document.getElementById("productTableBody").innerHTML += `
        <tr>
          <td><input type="checkbox" class="form-check-input vip-check" data-id="${doc.id}"></td>
          <td><img src="${p.img}" style="width:40px;height:40px;object-fit:cover;border-radius:5px;"></td>
          <td>${p.name}</td><td>${p.price} ₺</td>
          <td class="text-warning fw-bold"><i class="bi bi-fire"></i> ${clicks}</td>
          <td>
            <button class="btn btn-sm btn-primary edit-btn" data-id="${doc.id}"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger delete-btn" data-id="${doc.id}"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`;
    });
    document.getElementById("totalProductCount").innerText = adminProducts.length;

    document.querySelectorAll(".delete-btn").forEach(b => b.addEventListener("click", async (e) => {
      if(confirm("Siliyorum?")) { await deleteDoc(doc(db, "products", e.target.closest('button').dataset.id)); loadProducts(); }
    }));
  }

  // VIP TEKLİF MANTIĞI
  document.getElementById("vipBtn").addEventListener("click", () => {
    const checks = document.querySelectorAll(".vip-check:checked");
    if(checks.length === 0) return alert("Dayı önce tablodan ürün seç!");
    
    let total = 0; let msg = "Merhaba! Sizin için seçtiğimiz VIP Modeller:\n\n";
    checks.forEach((box, i) => {
       const p = adminProducts.find(x => x.id === box.dataset.id);
       total += parseInt(p.price.toString().replace(/[^0-9]/g, '')) || 0;
       msg += `${i+1}) ${p.name} - ${p.price} ₺\n`;
    });
    msg += `\nNormal Toplam: ${total} ₺\n`;
    
    const discount = prompt(`Seçilen ürünlerin toplamı: ${total} ₺.\nDayı sen kaça bırakacaksın? (Sadece rakam yaz)`);
    if(discount) {
       msg += `🎁 SİZE ÖZEL FİYAT: ${discount} ₺ 🎁\n\nİncelemek için: https://www.trendoptikmersin.com`;
       navigator.clipboard.writeText(msg); alert("Mesaj kopyalandı! Müşteriye yapıştır gitsin.");
    }
  });
</script>
</body>
</html>
