<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trend Optik | Yönetim Paneli</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #0f0f0f; color: #fff; font-family: 'Poppins', sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 2rem; }
    .accent { color: #f5a623; }
    .btn-accent { background: #f5a623; color: #000; font-weight: bold; border: none; }
    .btn-accent:hover { background: #ffbb33; }
    .form-control, .form-select { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; }
    .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.15); border-color: #f5a623; color: #fff; box-shadow: none; }
    #imagePreview { width: 100%; height: 200px; object-fit: contain; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.5); }
    .table { color: #fff; }
    .table th { border-bottom: 2px solid #f5a623; }
    .table td { border-bottom: 1px solid rgba(255, 255, 255, 0.1); vertical-align: middle; }
    
    /* Başlangıçta panel gizli, login açık */
    #dashboardSection { display: none; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="text-center mb-5">
    <h2 class="fw-bold"><span class="accent">Trend Optik</span> Yönetim</h2>
  </div>

  <div class="row justify-content-center" id="loginSection">
    <div class="col-md-5">
      <div class="glass-panel text-center">
        <i class="bi bi-shield-lock fs-1 accent mb-3"></i>
        <h4 class="mb-4">Yetkili Girişi</h4>
        <input type="email" id="emailInput" class="form-control mb-3" placeholder="E-posta Adresi">
        <input type="password" id="passwordInput" class="form-control mb-4" placeholder="Şifre">
        <button id="loginBtn" class="btn btn-accent w-100 rounded-pill">Giriş Yap</button>
        <p id="loginError" class="text-danger mt-3" style="display: none;">Hatalı giriş yaptınız!</p>
      </div>
    </div>
  </div>

  <div id="dashboardSection">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="m-0">Hoş Geldiniz, <span class="accent">Admin</span></h4>
      <button id="logoutBtn" class="btn btn-outline-danger rounded-pill px-4">Çıkış Yap</button>
    </div>

    <div class="row g-4">
      <div class="col-md-4">
        <div class="glass-panel">
          <h5 class="accent mb-3"><i class="bi bi-plus-circle me-2"></i>Yeni Ürün Ekle</h5>
          
          <div class="mb-3">
            <label class="form-label small">Ürün Adı (Örn: Ray-Ban Aviator)</label>
            <input type="text" id="pName" class="form-control">
          </div>
          
          <div class="mb-3">
            <label class="form-label small">Kategori</label>
            <select id="pCategory" class="form-select">
              <option value="gunes">Güneş Gözlüğü</option>
              <option value="klasik">Klasik Çerçeve</option>
              <option value="kadin">Kadın Modelleri</option>
              <option value="cocuk">Çocuk Modelleri</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label small">Fiyat (₺)</label>
            <input type="text" id="pPrice" class="form-control" placeholder="Örn: 2.500 ₺">
          </div>

          <div class="mb-3">
            <label class="form-label small">Kısa Açıklama</label>
            <input type="text" id="pDesc" class="form-control" placeholder="Örn: Polarize cam, hafif metal çerçeve">
          </div>

          <div class="mb-3">
            <label class="form-label small d-flex justify-content-between">
              <span>ImgBB Resim URL'si</span>
              <a href="https://imgbb.com/" target="_blank" class="accent text-decoration-none">Siteye Git <i class="bi bi-box-arrow-up-right"></i></a>
            </label>
            <input type="text" id="pImgUrl" class="form-control" placeholder="https://i.ibb.co/.../resim.jpg">
          </div>

          <div class="mb-4">
            <label class="form-label small">Görsel Önizleme</label>
            <div id="imagePreview">URL girince resim burada görünecek</div>
          </div>

          <button id="addBtn" class="btn btn-accent w-100 rounded-pill py-2">Ürünü Kaydet</button>
        </div>
      </div>

      <div class="col-md-8">
        <div class="glass-panel h-100">
          <h5 class="accent mb-3"><i class="bi bi-list-ul me-2"></i>Mevcut Ürünler</h5>
          <div class="table-responsive">
            <table class="table table-hover table-dark text-center align-middle">
              <thead>
                <tr>
                  <th>Görsel</th>
                  <th>Ürün Adı</th>
                  <th>Kategori</th>
                  <th>Fiyat</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody id="productTableBody">
                </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  // Firebase v10 CDN Importları
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // !!!!!!!! KANKA BURAYA KENDİ FİREBASE CONFİG KODUNU YAPIŞTIR !!!!!!!!
  const firebaseConfig = {
    apiKey: "BURAYA_API_KEY",
    authDomain: "BURAYA_AUTH_DOMAIN",
    projectId: "BURAYA_PROJECT_ID",
    storageBucket: "BURAYA_STORAGE_BUCKET",
    messagingSenderId: "BURAYA_SENDER_ID",
    appId: "BURAYA_APP_ID"
  };

  // Başlatma
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Elementler
  const loginSection = document.getElementById("loginSection");
  const dashboardSection = document.getElementById("dashboardSection");
  const imagePreview = document.getElementById("imagePreview");
  const pImgUrl = document.getElementById("pImgUrl");
  const productTableBody = document.getElementById("productTableBody");

  // GÖRSEL ÖNİZLEME MANTIĞI (URL yapıştırıldığı an çalışır)
  pImgUrl.addEventListener("input", function() {
    if(this.value.trim() !== "") {
      imagePreview.innerHTML = `<img src="${this.value}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
      imagePreview.style.border = "none";
    } else {
      imagePreview.innerHTML = "URL girince resim burada görünecek";
      imagePreview.style.border = "2px dashed rgba(255, 255, 255, 0.2)";
    }
  });

  // GİRİŞ YAP
  document.getElementById("loginBtn").addEventListener("click", () => {
    const email = document.getElementById("emailInput").value;
    const password = document.getElementById("passwordInput").value;
    
    signInWithEmailAndPassword(auth, email, password)
      .then(() => {
        document.getElementById("loginError").style.display = "none";
      })
      .catch((error) => {
        document.getElementById("loginError").style.display = "block";
        console.error("Giriş hatası:", error);
      });
  });

  // ÇIKIŞ YAP
  document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth);
  });

  // OTURUM KONTROLÜ (Giriş yaptıysa paneli göster)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginSection.style.display = "none";
      dashboardSection.style.display = "block";
      loadProducts(); // Giriş başarılıysa ürünleri çek
    } else {
      loginSection.style.display = "flex";
      dashboardSection.style.display = "none";
    }
  });

  // ÜRÜN EKLEME (Firestore'a Yazma)
  document.getElementById("addBtn").addEventListener("click", async () => {
    const name = document.getElementById("pName").value;
    const category = document.getElementById("pCategory").value;
    const price = document.getElementById("pPrice").value;
    const desc = document.getElementById("pDesc").value;
    const imgUrl = document.getElementById("pImgUrl").value;

    if(!name || !price || !imgUrl) {
      alert("Lütfen Ad, Fiyat ve Resim URL alanlarını doldurun kanka!");
      return;
    }

    try {
      await addDoc(collection(db, "products"), {
        name: name,
        category: category,
        price: price,
        desc: desc,
        img: imgUrl,
        createdAt: serverTimestamp() // Sıralama için zaman damgası
      });
      
      alert("Ürün başarıyla eklendi! Şov başlasın.");
      
      // Formu temizle
      document.getElementById("pName").value = "";
      document.getElementById("pPrice").value = "";
      document.getElementById("pDesc").value = "";
      document.getElementById("pImgUrl").value = "";
      imagePreview.innerHTML = "URL girince resim burada görünecek";
      
      // Tabloyu yenile
      loadProducts();

    } catch (e) {
      console.error("Eklenirken hata oldu: ", e);
      alert("Hata oluştu: " + e.message);
    }
  });

  // ÜRÜNLERİ ÇEKME VE TABLOYA YAZDIRMA
  async function loadProducts() {
    productTableBody.innerHTML = `<tr><td colspan="5">Yükleniyor...</td></tr>`;
    
    try {
      const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
      const querySnapshot = await getDocs(q);
      
      productTableBody.innerHTML = ""; // Yükleniyoru temizle
      
      if(querySnapshot.empty) {
        productTableBody.innerHTML = `<tr><td colspan="5">Henüz ürün eklenmemiş.</td></tr>`;
        return;
      }

      querySnapshot.forEach((doc) => {
        const product = doc.data();
        const row = `
          <tr>
            <td><img src="${product.img}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;"></td>
            <td class="fw-bold">${product.name}</td>
            <td><span class="badge bg-secondary">${product.category}</span></td>
            <td class="accent fw-bold">${product.price}</td>
            <td>
              <button class="btn btn-sm btn-danger delete-btn" data-id="${doc.id}">Sil</button>
            </td>
          </tr>
        `;
        productTableBody.innerHTML += row;
      });

      // Silme Butonlarına Olay Ekleme
      document.querySelectorAll(".delete-btn").forEach(btn => {
        btn.addEventListener("click", async (e) => {
          const id = e.target.getAttribute("data-id");
          if(confirm("Bu ürünü silmek istediğine emin misin?")) {
            await deleteDoc(doc(db, "products", id));
            loadProducts(); // Tabloyu güncelle
          }
        });
      });

    } catch (error) {
      console.error("Veriler çekilirken hata:", error);
      productTableBody.innerHTML = `<tr><td colspan="5" class="text-danger">Veriler yüklenemedi. Yetkileri kontrol et!</td></tr>`;
    }
  }
</script>
</body>
</html>
