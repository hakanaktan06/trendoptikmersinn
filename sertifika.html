<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP Garanti Sertifikası | Trend Optik</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Poppins', sans-serif; color: #fff; overflow: hidden; }
    .card-container { width: 90%; max-width: 400px; background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 2px solid #d4af37; border-radius: 20px; padding: 40px 30px; text-align: center; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); position: relative; }
    .card-container::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 25px; z-index: -1; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: #d4af37; letter-spacing: 3px; margin-bottom: 10px; }
    .vip-tag { background: #d4af37; color: #000; font-size: 0.7rem; font-weight: 800; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 30px; letter-spacing: 2px; }
    .greeting { font-weight: 300; opacity: 0.7; font-size: 0.9rem; margin-bottom: 5px; }
    .customer-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #fff; margin-bottom: 30px; }
    .info-box { border-top: 1px solid rgba(212, 175, 55, 0.2); border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding: 20px 0; margin-bottom: 30px; text-align: left; }
    .info-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
    .label { opacity: 0.5; }
    .value { font-weight: 600; color: #d4af37; }
    .reward-box { background: rgba(212, 175, 55, 0.1); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    .reward-title { font-size: 0.8rem; font-weight: 600; color: #d4af37; margin-bottom: 5px; }
    .reward-desc { font-size: 0.75rem; opacity: 0.8; }
    .footer-note { font-size: 0.65rem; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="card-container" id="certificateContent">
    <div class="logo">TREND OPTİK</div>
    <div class="vip-tag">VIP SADAKAT KARTI</div>
    
    <div class="greeting">Sayın</div>
    <div class="customer-name" id="cName">...</div>
    
    <div class="info-box">
      <div class="info-item"><span class="label">Ürün:</span> <span class="value" id="cProduct">...</span></div>
      <div class="info-item"><span class="label">Garanti No:</span> <span class="value" id="cId">...</span></div>
      <div class="info-item"><span class="label">Geçerlilik:</span> <span class="value">24 Ay Uluslararası</span></div>
    </div>
    
    <div class="reward-box">
  <div class="reward-title">🎁 SADAKAT HEDİYESİ</div>
  <div class="reward-desc">Bir sonraki alışverişinizde <span id="cDiscount">%15</span> İndirim tanımlanmıştır.</div>
</div>
<div class="info-item"><span class="label">Geçerlilik:</span> <span class="value" id="cDuration">24 Ay</span></div>

<script type="module">
  // ... (Firebase init kısımları aynı) ...
  if (certId) {
    async function getCert() {
      const docRef = doc(db, "certificates", certId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('cName').innerText = data.customerName;
        document.getElementById('cProduct').innerText = data.product;
        document.getElementById('cId').innerText = data.certNo; // Artık özel numara geliyor
        document.getElementById('cDiscount').innerText = `%${data.discountRate}`;
        document.getElementById('cDuration').innerText = `${data.duration} Ay`;
      }
    }
    getCert();
  }
</script>

</body>
</html>
